<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dev Assistant</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>AI Dev Assistant</h1>
      <p>
        Analyze code with multiple AI providers through one interface.
      </p>
    </header>

    <main class="card">
      <form id="analyzeForm">
        <div class="grid two-columns">
          <div class="field">
            <label for="provider">Provider</label>
            <select id="provider" name="provider">
              <option value="ollama">Ollama</option>
              <option value="openai-compatible">OpenAI-compatible</option>
            </select>
          </div>

          <div class="field">
            <label for="model">Model</label>
            <input
              id="model"
              name="model"
              type="text"
              placeholder="e.g. qwen2.5-coder or gpt-4.1-mini"
            />
          </div>
        </div>

        <div id="providerSettings" class="provider-settings"></div>

        <div class="grid two-columns">
          <div class="field">
            <label for="language">Language</label>
            <input
              id="language"
              name="language"
              type="text"
              value="JavaScript"
              placeholder="e.g. JavaScript, Python, Java"
            />
          </div>

          <div class="field">
            <label for="mode">Mode</label>
            <select id="mode" name="mode">
              <option value="explain">Explain code</option>
              <option value="improve">Improve code</option>
              <option value="bugs">Find bugs</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="code">Code</label>
          <textarea
            id="code"
            name="code"
            required
            placeholder="Paste your code here..."
          >function greet(name) {
  if (!name) {
    return "Hello, guest!";
  }
  return "Hello, " + name;
}

console.log(greet());
console.log(greet("Henna"));</textarea>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn">Analyze</button>
          <button type="button" id="clearBtn" class="secondary">Clear</button>
        </div>
      </form>
    </main>

    <section class="card result-card">
      <div class="result-header">
        <h2>Result</h2>
        <button type="button" id="copyBtn" class="secondary">Copy result</button>
      </div>

      <div id="status" class="status">Ready.</div>
      <pre id="result" class="result-output">Your AI response will appear here.</pre>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/script.js"></script>
</body>
</html>
